<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>별자리 항해 II — 성간 탐사선</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; overflow:hidden; background:#000; }
  body {
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo',
                 'Noto Sans KR', 'Malgun Gothic', sans-serif;
    color:#cdd6e4; -webkit-tap-highlight-color:transparent;
  }
  canvas { display:block; touch-action:none; }
  .hud { position:fixed; z-index:10; pointer-events:none; }

  #title { top:14px; left:16px; }
  #title h1 { font-size:15px; font-weight:600; color:#e8eef8; }
  #title p { font-size:11px; color:#6b7688; margin-top:3px; }

  #nav { top:14px; right:16px; text-align:right; font-variant-numeric:tabular-nums; }
  #nav .d { font-size:16px; font-weight:700; color:#e8eef8; }
  #nav .s { font-size:11px; color:#8b96a8; margin-top:3px; }
  #nav .t { font-size:11px; color:#9fb8e8; margin-top:3px; }

  /* 지구(태양) 인디케이터 */
  #home {
    position:fixed; z-index:9; pointer-events:none;
    transform:translate(-50%,-50%); text-align:center;
    transition:opacity 0.3s;
  }
  #home .arrow { font-size:15px; color:#7fd4a8; display:inline-block; }
  #home .mark { font-size:14px; }
  #home .lbl {
    font-size:10px; color:#9fe4c2; margin-top:2px;
    text-shadow:0 1px 6px #000; white-space:nowrap;
    background:rgba(10,26,18,0.55); border-radius:999px; padding:2px 8px;
  }

  #reticle {
    position:fixed; z-index:9; pointer-events:none;
    transform:translate(-50%,-50%); display:none; text-align:center;
  }
  #reticle .ring { width:34px; height:34px; margin:0 auto;
    border:1.5px solid rgba(140,200,255,0.8); border-radius:50%; }
  #reticle .name { font-size:11px; color:#aad4ff; margin-top:5px; text-shadow:0 1px 6px #000; }
  #earth-lbl {
    position:fixed; z-index:9; pointer-events:none; display:none;
    transform:translate(-50%,-160%);
    font-size:11px; color:#9fd0ff; text-shadow:0 1px 6px #000; white-space:nowrap;
  }
  #sel { position:fixed; z-index:9; pointer-events:none;
    transform:translate(-50%,-50%); display:none; }
  #sel .ring { width:26px; height:26px;
    border:1.5px dashed rgba(255,210,130,0.9); border-radius:50%; }
  #card .btns { display:flex; flex-wrap:wrap; gap:6px; margin-top:10px; }
  #card .cbtn { flex:1 1 44%; background:rgba(120,150,210,0.14);
    border:1px solid rgba(120,150,210,0.3); color:#cdd6e4;
    border-radius:8px; padding:6px 4px; font-size:11px;
    font-family:inherit; cursor:pointer; white-space:nowrap; }
  #card .cbtn:active { background:rgba(120,150,210,0.3); }
  #card .story { display:none; font-size:11px; color:#b8c9dd; line-height:1.6;
    margin-top:10px; padding-top:9px;
    border-top:1px solid rgba(120,140,180,0.15);
    max-height:170px; overflow-y:auto; white-space:pre-line; }
  #log {
    position:fixed; z-index:11; left:14px; bottom:88px; width:230px; max-height:52vh;
    overflow-y:auto;
    background:rgba(12,16,26,0.85); backdrop-filter:blur(14px);
    border:1px solid rgba(120,140,180,0.22); border-radius:14px; padding:14px;
    display:none;
  }
  #log.show { display:block; }
  #log h3 { font-size:12px; color:#ffd9a0; margin-bottom:8px; letter-spacing:0.06em; }
  #log .stat { display:flex; justify-content:space-between; font-size:11px; padding:4px 0;
    color:#8b96a8; border-top:1px solid rgba(120,140,180,0.1); }
  #log .stat b { color:#e8eef8; font-weight:600; font-variant-numeric:tabular-nums; }
  #log .item { font-size:11px; color:#c3cdd9; padding:4px 0;
    border-top:1px solid rgba(120,140,180,0.1); display:flex; justify-content:space-between; }
  #log .item span { color:#6b7688; font-size:10px; }

  #toast {
    top:64px; left:50%; transform:translateX(-50%);
    font-size:13px; color:#ffe9c9; text-align:center;
    background:rgba(40,30,14,0.75); border:1px solid rgba(255,200,120,0.3);
    border-radius:999px; padding:8px 18px;
    opacity:0; transition:opacity 0.4s; max-width:88vw;
    backdrop-filter:blur(8px);
  }
  #toast.show { opacity:1; }

  #card {
    position:fixed; z-index:11; right:14px; bottom:88px; width:242px;
    background:rgba(12,16,26,0.85); backdrop-filter:blur(14px);
    border:1px solid rgba(120,140,180,0.22); border-radius:14px; padding:16px;
    transform:translateY(12px); opacity:0; pointer-events:none;
    transition:opacity 0.25s, transform 0.25s;
  }
  #card.show { opacity:1; transform:translateY(0); pointer-events:auto; }
  #card .n { font-size:16px; font-weight:700; color:#eef3fb; }
  #card .e { font-size:11px; color:#6b7688; margin:2px 0 10px; }
  #card .row { display:flex; justify-content:space-between; font-size:12px; padding:5px 0;
               border-top:1px solid rgba(120,140,180,0.12); gap:8px; }
  #card .row .k { color:#8b96a8; white-space:nowrap; } #card .row .v { color:#dfe7f2; text-align:right; }
  #card .close { position:absolute; top:10px; right:12px; color:#6b7688;
                 font-size:15px; cursor:pointer; background:none; border:none; padding:4px; }

  #dex {
    position:fixed; z-index:11; left:14px; bottom:88px; width:216px; max-height:44vh;
    overflow-y:auto;
    background:rgba(12,16,26,0.85); backdrop-filter:blur(14px);
    border:1px solid rgba(120,140,180,0.22); border-radius:14px; padding:14px;
    display:none;
  }
  #dex.show { display:block; }
  #dex h3 { font-size:12px; color:#9fb8e8; margin-bottom:8px; letter-spacing:0.06em; }
  #dex .item { font-size:11px; color:#c3cdd9; padding:4px 0;
               border-top:1px solid rgba(120,140,180,0.1); }
  #dex .item span { color:#6b7688; }

  #controls {
    position:fixed; z-index:10; left:50%; bottom:12px; transform:translateX(-50%);
    display:flex; flex-wrap:wrap; justify-content:center; align-items:center; gap:7px;
    background:rgba(12,16,26,0.66); backdrop-filter:blur(12px);
    border:1px solid rgba(120,140,180,0.18); border-radius:14px;
    padding:8px 11px; max-width:calc(100vw - 20px);
    transition:opacity 0.6s;
  }
  #controls.dim { opacity:0.22; }
  #controls button, #controls select {
    background:rgba(120,150,210,0.12); border:1px solid rgba(120,150,210,0.25);
    color:#cdd6e4; border-radius:9px; padding:6px 10px; font-size:12px;
    font-family:inherit; cursor:pointer; white-space:nowrap;
  }
  #controls select { max-width:44vw; text-overflow:ellipsis; }
  #controls button.on { background:rgba(140,190,255,0.3); border-color:rgba(140,190,255,0.55); }
  #controls button:active { background:rgba(120,150,210,0.28); }
  #more { display:none; width:100%; justify-content:center; flex-wrap:wrap; gap:7px; }
  #controls.open #more { display:flex; }
  #timebox {
    position:fixed; z-index:10; left:50%; bottom:70px; transform:translateX(-50%);
    display:none; flex-wrap:wrap; justify-content:center; align-items:center;
    gap:8px; row-gap:6px;
    background:rgba(12,16,26,0.72); backdrop-filter:blur(12px);
    border:1px solid rgba(220,180,110,0.3); border-radius:14px;
    padding:9px 14px; width:min(340px, calc(100vw - 20px));
  }
  #timebox.show { display:flex; }
  #timebox .t-read { flex:1 0 100%; font-size:11px; color:#ffd9a0;
    text-align:center; font-variant-numeric:tabular-nums; }
  #time-slider { -webkit-appearance:none; appearance:none;
    width:min(140px, 32vw); height:3px;
    border-radius:2px; background:rgba(220,180,110,0.3); outline:none; }
  #time-slider::-webkit-slider-thumb { -webkit-appearance:none; appearance:none;
    width:16px; height:16px; border-radius:50%; background:#e8c07a;
    border:2px solid #0c101a; cursor:pointer; }
  #timebox button { background:rgba(220,180,110,0.14);
    border:1px solid rgba(220,180,110,0.35); color:#ffd9a0;
    border-radius:8px; padding:5px 10px; font-size:11px;
    font-family:inherit; cursor:pointer; white-space:nowrap; }
  #time-pill {
    position:fixed; z-index:9; top:44px; left:50%; transform:translateX(-50%);
    font-size:11px; color:#ffd9a0; pointer-events:none; display:none;
    background:rgba(60,45,15,0.6); border:1px solid rgba(220,180,110,0.35);
    border-radius:999px; padding:4px 12px; white-space:nowrap;
  }
  .overlay {
    position:fixed; inset:0; z-index:13; display:none;
    flex-direction:column; align-items:center; justify-content:center; gap:10px;
    background:rgba(4,7,14,0.94); backdrop-filter:blur(6px); padding:16px;
  }
  .overlay.show { display:flex; }
  .ov-head { display:flex; align-items:center; gap:10px;
    font-size:13px; font-weight:600; color:#e8eef8; }
  .ov-close, .ov-btn {
    background:rgba(120,150,210,0.14); border:1px solid rgba(120,150,210,0.3);
    color:#cdd6e4; border-radius:8px; padding:5px 11px; font-size:12px;
    font-family:inherit; cursor:pointer;
  }
  .ov-btn.on { background:rgba(140,190,255,0.3); border-color:rgba(140,190,255,0.55); }
  .overlay canvas { border-radius:12px; border:1px solid rgba(120,140,180,0.2);
    max-width:100%; max-height:70vh; }
  .ov-cap { font-size:11px; color:#8b96a8; text-align:center; max-width:88vw; }
  #speed-wrap { display:flex; align-items:center; gap:6px; }
  #speed-wrap label { font-size:11px; color:#8b96a8; }
  #speed { -webkit-appearance:none; appearance:none; width:72px; height:3px; border-radius:2px;
           background:rgba(120,150,210,0.3); outline:none; }
  #speed::-webkit-slider-thumb { -webkit-appearance:none; appearance:none;
    width:16px; height:16px; border-radius:50%; background:#9fb8e8;
    cursor:pointer; border:2px solid #0c101a; }
  @media (prefers-reduced-motion: reduce) { #card, #toast, #home { transition:none; } }
</style>
</head>
<body>

<div class="hud" id="title">
  <h1>별자리 항해 II</h1>
  <p>실제 별 4,536개 · 접근 시 실체 렌더링</p>
</div>

<div class="hud" id="nav">
  <div class="d" id="nav-dist">태양 거리 0 ly</div>
  <div class="s" id="nav-speed">정지</div>
  <div class="t" id="nav-target"></div>
</div>

<div id="home">
  <div><span class="arrow" id="home-arrow">➤</span><span class="mark" id="home-mark">🌍</span></div>
  <div class="lbl" id="home-lbl">태양</div>
</div>

<div id="reticle"><div class="ring"></div><div class="name" id="reticle-name"></div></div>
<div id="earth-lbl">🌍 지구</div>
<div id="sel"><div class="ring"></div></div>
<div class="hud" id="toast"></div>

<div id="card">
  <button class="close" id="card-close">✕</button>
  <div class="n" id="c-n"></div>
  <div class="e" id="c-e"></div>
  <div id="c-rows"></div>
  <div class="btns" id="c-btns"></div>
  <div class="story" id="c-story"></div>
</div>

<div id="dex">
  <h3>발견 도감 — 숨어 있던 별들</h3>
  <div id="dex-list"></div>
</div>

<div id="controls">
  <select id="dest">
    <option value="">🧭 목적지…</option>
    <optgroup label="여름 밤하늘 — 지금 계절 🌙">
      <option value="91262">베가 (25 ly)</option>
      <option value="97649">알타이르 (17 ly)</option>
      <option value="102098">데네브 (1,412 ly)</option>
      <option value="95947">알비레오 · 쌍성 (434 ly)</option>
      <option value="80763">안타레스 · 적색초거성 (554 ly)</option>
    </optgroup>
    <optgroup label="겨울 밤하늘">
      <option value="27989">베텔게우스 · 초거성 (498 ly)</option>
      <option value="24436">리겔 (863 ly)</option>
      <option value="26311">알닐람 · 오리온 벨트 (1,977 ly)</option>
      <option value="32349">시리우스 · 쌍성 (8.6 ly)</option>
      <option value="24608">카펠라 (43 ly)</option>
    </optgroup>
    <optgroup label="봄 밤하늘">
      <option value="69673">아크투루스 (37 ly)</option>
      <option value="65474">스피카 (250 ly)</option>
    </optgroup>
    <optgroup label="북쪽 하늘 — 사계절">
      <option value="11767">폴라리스 · 북극성 (433 ly)</option>
      <option value="54061">두베 (123 ly)</option>
      <option value="65378">미자르 · 쌍성 (86 ly)</option>
      <option value="67301">알카이드 (104 ly)</option>
      <option value="3179">셰다르 · 카시오페이아 (228 ly)</option>
    </optgroup>
    <optgroup label="가까운 이웃">
      <option value="70890">프록시마 · 최근접 별 (4.2 ly)</option>
      <option value="71683">알파 센타우리 · 쌍성 (4.3 ly)</option>
      <option value="87937">바너드 별 (5.9 ly)</option>
      <option value="104214">61 Cygni · 최초 거리 측정 (11 ly)</option>
      <option value="37279">프로키온 · 쌍성 (11 ly)</option>
    </optgroup>
  </select>
  <div id="speed-wrap">
    <label>워프</label>
    <input type="range" id="speed" min="0" max="100" value="45">
  </div>
  <button id="btn-time">⏳</button>
  <button id="btn-more">⋯</button>
  <div id="more">
    <button id="btn-stop">정지</button>
    <button id="btn-back">☀ 뒤돌아보기</button>
    <button id="btn-home">🌍 지구로</button>
    <button id="btn-lines" class="on">별자리선</button>
    <button id="btn-dex">🔭 발견 <span id="dex-count">0</span></button>
    <button id="btn-log">📓 일지</button>
    <button id="btn-hr">📊 H-R</button>
    <button id="btn-map">🌌 지도</button>
  </div>
</div>

<div id="timebox">
  <div class="t-read" id="time-read">현재 — 서기 2026년</div>
  <button id="time-rev">◀</button>
  <input type="range" id="time-slider" min="-50000" max="50000" step="100" value="0">
  <button id="time-fwd">▶</button>
  <button id="time-follow">📌 추적</button>
  <button id="time-now">⟲ 지금</button>
</div>

<div id="time-pill">⏳</div>

<div id="hr" class="overlay">
  <div class="ov-head"><span>H-R 다이어그램 — 내가 모은 별들</span><button class="ov-close" id="hr-close">✕</button></div>
  <canvas id="hr-cv"></canvas>
  <div class="ov-cap">방문 ● 금색 · 발견한 숨은 별 ● 주황 · 탭한 별 ✛</div>
</div>

<div id="map" class="overlay">
  <div class="ov-head">
    <span>은하 지도</span>
    <button class="ov-btn on" id="map-local">탐사 영역</button>
    <button class="ov-btn" id="map-gal">은하 전체</button>
    <button class="ov-close" id="map-close">✕</button>
  </div>
  <canvas id="map-cv"></canvas>
  <div class="ov-cap" id="map-cap"></div>
</div>

<div id="log">
  <h3>여행 일지</h3>
  <div class="stat"><span>누적 항해</span><b id="log-total">0 ly</b></div>
  <div class="stat"><span>환산</span><b id="log-au">—</b></div>
  <div class="stat"><span>방문한 별</span><b id="log-visits">0곳</b></div>
  <div class="stat"><span>발견한 숨은 별</span><b id="log-found">0개</b></div>
  <div id="log-list"></div>
</div>

// 별 물리량: 색지수 -> 온도, 광도 -> 반지름 (R ∝ √L / T²)
// ============================================================
function starTemp(ci){
  return 4600*(1/(0.92*ci+1.7)+1/(0.92*ci+0.62));
}
function starRadiusSol(i){ // 태양 반지름 단위
  const L = Math.pow(10, (4.83 - DATA.M[i])/2.5);
  const T = starTemp(DATA.CI[i]);
  return Math.sqrt(L) * Math.pow(5772/T, 2);
}
function visRadiusLy(Rsol){ // 시각화용 반지름 (동적범위 압축)
  return THREE.MathUtils.clamp(0.002*Math.pow(Rsol, 0.55), 0.0008, 0.05);
}
function tempToRGB(T){
  const Tc = Math.min(Math.max(T,1500),40000)/100;
  let r,g,b;
  r = Tc<=66 ? 255 : 329.7*Math.pow(Tc-60,-0.1332);
  g = Tc<=66 ? 99.47*Math.log(Tc)-161.1 : 288.1*Math.pow(Tc-60,-0.0755);
  b = Tc>=66 ? 255 : (Tc<=19 ? 60 : 138.5*Math.log(Tc-10)-305.0);
  return [r,g,b].map(v => Math.min(Math.max(v/255,0),1));
}

// ============================================================
const SURFACE_VERT = `
  varying vec3 vN; varying vec3 vV; varying vec3 vObjN;
  void main(){
    vObjN = normal;
    vN = normalize(normalMatrix * normal);
    vec4 mv = modelViewMatrix * vec4(position, 1.0);
    vV = -normalize(mv.xyz);
    gl_Position = projectionMatrix * mv;
  }`;
const SURFACE_FRAG = `
  uniform vec3 uColor; uniform float uTime; uniform float uAmp;
  varying vec3 vN; varying vec3 vV; varying vec3 vObjN;
  float hash(vec3 p){ p = fract(p*0.3183099 + 0.1); p *= 17.0;
    return fract(p.x*p.y*p.z*(p.x+p.y+p.z)); }
  float noise(vec3 x){
    vec3 i = floor(x); vec3 f = fract(x); f = f*f*(3.0-2.0*f);
    return mix(mix(mix(hash(i),hash(i+vec3(1,0,0)),f.x),
                   mix(hash(i+vec3(0,1,0)),hash(i+vec3(1,1,0)),f.x),f.y),
               mix(mix(hash(i+vec3(0,0,1)),hash(i+vec3(1,0,1)),f.x),
                   mix(hash(i+vec3(0,1,1)),hash(i+vec3(1,1,1)),f.x),f.y),f.z);
  }
  float fbm(vec3 p){
    float v = 0.0, a = 0.5;
    for (int k=0;k<4;k++){ v += a*noise(p); p *= 2.15; a *= 0.5; }
    return v;
  }
  void main(){
    float n = fbm(vObjN*7.5 + vec3(0.0, 0.0, uTime*0.12));
    float gr = 1.0 - uAmp*0.55 + uAmp*1.25*n;         // 쌀알무늬
    float mu = clamp(dot(normalize(vN), normalize(vV)), 0.0, 1.0);
    float limb = pow(mu, 0.55);                        // 주연감광
    vec3 col = uColor * (0.22 + 1.2*limb) * gr * 1.4;
    col += uColor * pow(1.0-mu, 3.0) * 0.45;           // 가장자리 광휘
    gl_FragColor = vec4(col, 1.0);
  }`;

function glowTexture(){
  const c = document.createElement('canvas'); c.width = c.height = 128;
  const ctx = c.getContext('2d');
  const g = ctx.createRadialGradient(64,64,0,64,64,64);
  g.addColorStop(0,'rgba(255,255,255,0.85)');
  g.addColorStop(0.35,'rgba(255,255,255,0.22)');
  g.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle = g; ctx.fillRect(0,0,128,128);
  return new THREE.CanvasTexture(c);
}
const GLOW_TEX = glowTexture();

function makeBodySlot(){
  const mat = new THREE.ShaderMaterial({
    uniforms: { uColor:{value:new THREE.Color(1,1,1)}, uTime:{value:0}, uAmp:{value:0.3} },
    vertexShader: SURFACE_VERT, fragmentShader: SURFACE_FRAG
  });
  const mesh = new THREE.Mesh(new THREE.SphereGeometry(1, 48, 48), mat);
  mesh.visible = false; scene.add(mesh);
  const glow = new THREE.Sprite(new THREE.SpriteMaterial({
    map: GLOW_TEX, blending:THREE.AdditiveBlending, depthWrite:false, transparent:true
  }));
  glow.visible = false; scene.add(glow);
  return { mesh, glow, mat };
}
const bodySlots = [makeBodySlot(), makeBodySlot(), makeBodySlot()];

function setBody(slot, worldPos, T, Rvis, glowColor){
  const [r,g,b] = tempToRGB(T);
  slot.mat.uniforms.uColor.value.setRGB(r,g,b);
  slot.mat.uniforms.uAmp.value = T < 4500 ? 0.55 : (T < 7000 ? 0.32 : 0.16);
  slot.mesh.position.copy(worldPos);
  slot.mesh.scale.setScalar(Rvis);
  slot.mesh.visible = true;
  slot.glow.position.copy(worldPos);
  slot.glow.scale.setScalar(Rvis*7);
  slot.glow.material.color.setRGB(r,g,b);
  slot.glow.visible = true;
}
function clearSlots(list){ list.forEach(s => { s.mesh.visible = false; s.glow.visible = false; }); }

let nearBodies = [];
function refreshNearBodies(){
  const cands = [];
  for (let i=0;i<N;i++){
    _v1.set(positions[i*3], positions[i*3+1], positions[i*3+2]);
    const d = _v1.distanceTo(ship.pos);
    if (d < 0.8) cands.push({ i, d });
  }
  cands.sort((a,b) => a.d - b.d);
  // 데이터상 겹치는 근접쌍 제거 (연출 동반성으로 대체)
  const picked = [];
  for (const c of cands){
    if (picked.length >= 3) break;
    let dup = false;
    for (const p of picked){
      _v1.set(positions[c.i*3], positions[c.i*3+1], positions[c.i*3+2]);
      _v2.set(positions[p.i*3], positions[p.i*3+1], positions[p.i*3+2]);
      if (_v1.distanceTo(_v2) < 0.006){ dup = true; break; }
    }
    if (!dup) picked.push(c);
  }
  nearBodies = picked;
}

let simT = 0;
function updateBodies(dt){
  simT += dt;
  clearSlots(bodySlots); clearSlots(compSlots);
  let compUsed = 0;
  nearBodies.forEach((c, k) => {
    const slot = bodySlots[k];
    const T = starTemp(DATA.CI[c.i]);
    const Rvis = visRadiusLy(starRadiusSol(c.i));
    if (c.d > Rvis*220) return; // 아직 너무 멀면 점으로만
    const wp = starPos(c.i);
    setBody(slot, wp, T, Rvis);
    slot.mat.uniforms.uTime.value = simT;
    // 동반성
    const sys = SYSTEMS[DATA.HIP[c.i]];
    if (sys){
      sys.comps.forEach(cp => {
        if (compUsed >= compSlots.length) return;
        const cs = compSlots[compUsed++];
        const a = simT*cp.spd;
        const sep = Rvis*cp.sepF + visRadiusLy(cp.R)*2.0;
        _v1.set(Math.cos(a)*sep, Math.sin(a*0.7)*sep*0.18, Math.sin(a)*sep).add(wp);
        setBody(cs, _v1, cp.T, visRadiusLy(cp.R));
        cs.mat.uniforms.uTime.value = simT*1.3;
      });
    }
  });
}

function buildLineIdx(pairsHip){
  const idx = [];
  for (let k=0;k<pairsHip.length;k+=2){
    const a = hipIdx[pairsHip[k]], b = hipIdx[pairsHip[k+1]];
    if (a !== undefined && b !== undefined) idx.push(a, b);
  }
  return idx;
}
function makeLineObj(idx, color, opacity){
  const arr = new Float32Array(idx.length*3);
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(arr, 3));
  const obj = new THREE.LineSegments(geo,
    new THREE.LineBasicMaterial({ color, transparent:true, opacity }));
  obj.frustumCulled = false;
  obj.userData.idx = idx;
  scene.add(obj);
  return obj;
}
function refreshLineObj(obj){
  const idx = obj.userData.idx;
  const arr = obj.geometry.attributes.position.array;
  for (let k=0;k<idx.length;k++){
    const s = idx[k]*3;
    arr[k*3] = positions[s]; arr[k*3+1] = positions[s+1]; arr[k*3+2] = positions[s+2];
  }
  obj.geometry.attributes.position.needsUpdate = true;
}

function dirToYawPitch(dir){
  return { pitch: Math.asin(THREE.MathUtils.clamp(dir.y,-1,1)), yaw: Math.atan2(-dir.x, -dir.z) };
}
function aimAt(p){
  const d = p.clone().sub(ship.pos).normalize();
  const yp = dirToYawPitch(d);
  ship.aimYaw = yp.yaw; ship.aimPitch = yp.pitch; ship.aiming = true;

// 수동 줌: 시선 방향으로 전진/후퇴 (도착 후 물러나서 감상하기)
const _mv = new THREE.Vector3(), _mvDir = new THREE.Vector3();
function moveAlongView(k){
  camera.getWorldDirection(_mvDir);
  let dmin = 0.08;
  if (nearBodies.length){
    _mv.set(positions[nearBodies[0].i*3], positions[nearBodies[0].i*3+1], positions[nearBodies[0].i*3+2]);
    dmin = THREE.MathUtils.clamp(_mv.distanceTo(ship.pos), 0.004, 0.5);
  }
  _mv.copy(ship.pos).addScaledVector(_mvDir, dmin*0.14*k);
  // 항성 표면 최소 접근 제한
  for (const c of nearBodies){
    _v1.set(positions[c.i*3], positions[c.i*3+1], positions[c.i*3+2]);
    if (_mv.distanceTo(_v1) < visRadiusLy(starRadiusSol(c.i))*1.7) return;
  }
  ship.pos.copy(_mv);
  log.total += Math.abs(dmin*0.14*k); logDirty = true;
}
el.addEventListener('wheel', e => {
  e.preventDefault();
  moveAlongView(e.deltaY < 0 ? 1 : -1);
}, { passive:false });
let pinchD = 0;
el.addEventListener('touchstart', e => {
  if (e.touches.length === 2){
    dragging = false;
    pinchD = Math.hypot(e.touches[0].clientX-e.touches[1].clientX,
                        e.touches[0].clientY-e.touches[1].clientY);
  }
}, { passive:true });
el.addEventListener('touchmove', e => {
  if (e.touches.length === 2){
    const d = Math.hypot(e.touches[0].clientX-e.touches[1].clientX,
                         e.touches[0].clientY-e.touches[1].clientY);
    moveAlongView((d - pinchD)/60);
    pinchD = d;
  }
}, { passive:true });

let selectedIdx = null;
const _tDir = new THREE.Vector3(), _tp = new THREE.Vector3();
function tapSelect(x, y){
  const nx = x/innerWidth*2 - 1, ny = -(y/innerHeight)*2 + 1;
  camera.getWorldDirection(_tDir);
  let best = -1, bestPx = 26;
  for (let i=0;i<N;i++){
    _tp.set(positions[i*3], positions[i*3+1], positions[i*3+2]);
    _v2.copy(_tp).sub(ship.pos);
    const dly = _v2.length();
    if (dly < 1e-5 || _v2.dot(_tDir) <= 0) continue;
    const m = DATA.M[i] + 5*Math.log10(Math.max(dly/LY, 1e-4)/10);
    if (m > 6.8) continue;
    _tp.project(camera);
    const dpx = Math.hypot((_tp.x-nx)*0.5*innerWidth, (_tp.y-ny)*0.5*innerHeight);
    if (dpx < bestPx){ best = i; bestPx = dpx; }
  }
  if (best >= 0){ selectedIdx = best; showCard(best); }
  else hideCard();
}

let followIdx = null, followAng = 0, followDist = 0.5, lastArrival = null;
const btnFollow = document.getElementById('time-follow');

  const idx = (selectedIdx !== null) ? selectedIdx : lastArrival;

function stepFollow(dt){
  if (followIdx === null) return;
  ship.aiming = false;
  followAng += dt*0.13; // 서서히 선회하며 여러 각도에서
  const sp = starPos(followIdx);
  ship.pos.set(
    sp.x + followDist*Math.cos(followAng),
    sp.y + followDist*0.28*Math.sin(followAng*0.6),
    sp.z + followDist*Math.sin(followAng)
  );
  const d = sp.clone().sub(ship.pos).normalize();
  const yp = dirToYawPitch(d);
  ship.yaw = yp.yaw; ship.pitch = yp.pitch;
}

function applyTime(t){
  timeYr = t;
  for (let k=0;k<N*3;k++) positions[k] = P0[k] + VEL[k]*timeYr;
  starGeo.attributes.position.needsUpdate = true;
  refreshLineObj(lineObj);
  refreshLineObj(triObj);
  const shown = Math.round(timeYr/10)*10;
  if (shown === 0){
    timeRead.textContent = '현재 — 서기 2026년';
    timePill.style.display = 'none';
  } else {
    const abs = Math.abs(shown).toLocaleString();
    const lbl = shown > 0
      ? `+${abs}년 후 — 서기 ${(2026+shown).toLocaleString()}년`
      : `${abs}년 전`;
    timeRead.textContent = lbl;
    timePill.textContent = '⏳ ' + lbl;
    timePill.style.display = 'block';
  }
}
// 매 프레임: 재생 진행 + 목표를 향해 부드럽게 보간
function stepTime(dt){
  if (timePlay !== 0){
    timeTarget = THREE.MathUtils.clamp(timeTarget + timePlay*TIME_RATE*dt, -50000, 50000);
    if (Math.abs(timeTarget) >= 50000) setPlay(0);
    timeSlider.value = Math.round(timeTarget);
  }
  const diff = timeTarget - timeYr;
  if (Math.abs(diff) > 0.5){
    applyTime(Math.abs(diff) < 2 ? timeTarget : timeYr + diff*Math.min(1, dt*3.2));
  }
}

async function sGet(k){
  try { const r = await window.storage.get(k); if (r) return JSON.parse(r.value); } catch(e){}
  try { const r = localStorage.getItem(k); return r ? JSON.parse(r) : null; } catch(e){ return null; }
}
async function sSet(k,v){
  const s = JSON.stringify(v);
  try { await window.storage.set(k, s); return; } catch(e){}
  try { localStorage.setItem(k, s); } catch(e){}
}
function saveLog(){
  logDirty = false;
  sSet('voyage-log', { visits: log.visits.slice(0,100), total: log.total, found: [...found] });
}

// ============================================================
function obsGuide(i){
  const LAT = 37.3;
  const ra = DATA.RA[i], dec = DATA.DE[i];
  const raH = Math.floor(ra), raM = Math.round((ra-raH)*60);
  const lines = [`적경 ${raH}h ${raM}m · 적위 ${dec>0?'+':''}${dec}°`];
  if (dec > 90-LAT){
    lines.push('북쪽 하늘에 일 년 내내 떠 있는 주극성 — 계절 상관없이 북쪽을 보세요.');
  } else if (dec < -(90-LAT)){
    lines.push('아쉽게도 한국 위도에서는 지평선 위로 올라오지 않는 별입니다.');
  } else {
    let m = Math.round((ra-12)/2 + 4); m = ((m-1)%12+12)%12+1;
    const alt = Math.round(90 - Math.abs(LAT - dec));
    const dir = dec > LAT ? '북' : '남';
    lines.push(`${m}월경 자정에 가장 높이 뜹니다 — ${dir}쪽 하늘, 고도 약 ${alt}°.`);
    const now = new Date().getMonth()+1;
    const diff = Math.min(Math.abs(m-now), 12-Math.abs(m-now));
    if (diff <= 1) lines.push('지금이 관측 적기입니다 🌙');
    else if (diff <= 3) lines.push('요즘 밤에도 시간대를 맞추면 볼 수 있습니다.');
    else lines.push(`지금은 태양과 가까운 계절이라 어렵습니다 — ${m}월을 기다리세요.`);
  }
  const mE = DATA.ME[i];
  if (mE < 2) lines.push('장비: 도심에서도 맨눈으로 바로 보입니다.');
  else if (mE < 4) lines.push('장비: 맨눈으로 어렵지 않게 찾을 수 있습니다.');
  else if (mE < 6) lines.push('장비: 맨눈 가능하지만 어두운 하늘이 필요합니다.');
  else if (mE < 9.5) lines.push('장비: 쌍안경 이상이 필요합니다.');
  else lines.push('장비: 90mm급 이상 망원경이 필요합니다.');
  return lines.join('\n');
}

    .forEach((p,i) => { const x=TX(p[0]), y=LG(p[1]); i? c.lineTo(x,y) : c.moveTo(x,y); });
  c.stroke();

  c.fillStyle = 'rgba(255,170,120,0.55)'; c.fillText('거성·초거성', TX(4200), LG(3000));

// 🌌 은하 좌표계 (J2000) · 은하수 배경 · 은하 지도
// ============================================================
const GALM = [
  [-0.0548755604,-0.8734370902,-0.4838350155],
  [ 0.4941094279,-0.4448296300, 0.7469822445],
  [-0.8676661490,-0.1980763734, 0.4559837762]
];
function galXY(i){ // 은하면 투영 (ly): +x = 은하 중심 방향
  const qx = positions[i*3], qy = positions[i*3+2], qz = positions[i*3+1];
  return [ qx*GALM[0][0]+qy*GALM[0][1]+qz*GALM[0][2],
           qx*GALM[1][0]+qy*GALM[1][1]+qz*GALM[1][2] ];
}
(function milkyWay(){
  function gauss(){ let u=0,v=0; while(!u)u=Math.random(); while(!v)v=Math.random();
    return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v); }
  const COUNT = 7000, R = 48000;
  const pos = new Float32Array(COUNT*3);
  for (let i=0;i<COUNT;i++){
    const bulge = i < 1600;
    const l = bulge ? gauss()*0.5 : Math.random()*Math.PI*2;
    const b = gauss() * (bulge ? 0.16 : 0.10);
    const g0=Math.cos(b)*Math.cos(l), g1=Math.cos(b)*Math.sin(l), g2=Math.sin(b);
    const ex = GALM[0][0]*g0 + GALM[1][0]*g1 + GALM[2][0]*g2;
    const ey = GALM[0][1]*g0 + GALM[1][1]*g1 + GALM[2][1]*g2;
    const ez = GALM[0][2]*g0 + GALM[1][2]*g1 + GALM[2][2]*g2;
    pos[i*3]=ex*R; pos[i*3+1]=ez*R; pos[i*3+2]=ey*R;
  }
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.BufferAttribute(pos,3));
  const mw = new THREE.Points(g, new THREE.PointsMaterial({
    color:0x8f9ab8, size:1.5, sizeAttenuation:false,
    transparent:true, opacity:0.28, blending:THREE.AdditiveBlending, depthWrite:false
  }));
  mw.frustumCulled = false;
  scene.add(mw);
})();

    gr.addColorStop(0,'rgba(210,190,150,0.5)');

    gr.addColorStop(1,'rgba(120,140,190,0)');

    c.strokeStyle='rgba(160,175,215,0.16)'; c.lineWidth=8; c.lineCap='round';
    for (let arm=0; arm<4; arm++){
      c.beginPath();
      for (let t=0;t<=1.001;t+=0.04){
        const th = arm*Math.PI/2 + t*2.4;
        const r = rr*(0.18+0.8*t);
        const x=cx+r*Math.cos(th), y=cy+r*Math.sin(th);

  for (let i=1;i<N;i++){
    const g = galXY(i);

    c.fillRect(MX(g[0]), MY(g[1]), 1, 1);
  }
  c.fillStyle='#ffd27a';
  const seen = new Set();
  log.visits.forEach(v => {
    const i = (v.i!==undefined)? v.i : nameIdx[v.n];
    if (i===undefined || i===0 || seen.has(i)) return; seen.add(i);
    const g=galXY(i);
    c.beginPath(); c.arc(MX(g[0]),MY(g[1]), mapMode==='local'?2.5:2, 0, 7); c.fill();
  });
  const qx=ship.pos.x, qy=ship.pos.z, qz=ship.pos.y;

  c.fillStyle='#ffe9c9'; c.font='10px sans-serif'; c.textAlign='left';

  69673:'목동자리의 주황색 거성. 1933년 시카고 만국박람회에서 아크투루스의 빛을 광전지로 받아 개막 조명을 점등한 일화로 유명합니다. 북두칠성 손잡이 곡선을 따라 내려오면 만나는 봄의 길잡이별입니다.',
  65474:'처녀자리의 청백색 별. 실제로는 나흘마다 서로를 도는 매우 뜨거운 쌍성으로, 두 별이 조석력에 달걀처럼 늘어나 있습니다.',
  37279:'작은개자리의 으뜸별. 시리우스처럼 백색왜성 동반성(프로키온 B)을 거느리고 있으며, 겨울 대삼각형의 한 꼭짓점입니다.',
  3179:'카시오페이아 W자의 두 번째 별. 주황색 거성으로, 카시오페이아는 북극성 반대편에서 북두칠성과 시소를 타듯 도는 길잡이 별자리입니다.',
  104214:'1838년 베셀이 인류 최초로 연주시차 측정에 성공해 "별까지의 거리"를 잰 역사적인 별입니다. 그전까지 별의 거리는 순전히 추측이었죠. 주황색 왜성 두 개가 서로를 도는 쌍성이기도 합니다.'
};
const STORY_SUN = '우리 별. 지금 이 순간에도 초당 400만 톤의 질량을 빛으로 바꾸고 있습니다. 이 시뮬레이션의 다른 모든 별처럼, 태양도 누군가의 밤하늘에서는 이름 없는 점입니다.';

async function aiStory(i, box){
  box.style.display = 'block';
  box.textContent = '🤖 AI가 실측 데이터를 해석하는 중…';
  try {
    const T = Math.round(starTemp(DATA.CI[i]));
    const R = starRadiusSol(i);
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6', max_tokens: 1000,
        messages: [{ role: 'user', content:
          '너는 친절한 천문 해설가야. 초보 관측자에게 아래 별을 한국어 3~4문장으로 소개해줘. 실측 데이터에 근거해 어떤 종류의 별이고 어떤 모습일지 담백하게 해석하고, 확실하지 않은 역사나 명칭 정보는 절대 지어내지 마. 인사말 없이 본문만.\n'
          + `이름: ${starName(i)} / 분광형: ${DATA.SP[i]}형 / 지구에서 거리: ${fmtLy(starPos(i).length())} / 절대등급: ${DATA.M[i]} / 지구에서 겉보기등급: ${DATA.ME[i]} / 표면온도: 약 ${T}K / 반지름: 태양의 ${R.toFixed(2)}배` }]
      })
    });
    const data = await res.json();
    const txt = (data.content || []).filter(b => b.type === 'text').map(b => b.text).join('\n').trim();
    box.textContent = txt || '해설을 가져오지 못했습니다.';
  } catch (e) {
    box.textContent = '해설 생성 실패 — AI 해설은 Claude 앱 안에서 열었을 때만 동작해요. (내장 해설이 있는 유명한 별들은 정상 동작합니다)';
  }
}

function showCard(idx){
  document.getElementById('c-n').textContent = starName(idx);
  document.getElementById('c-e').textContent = idx===0 ? 'SOL · 우리 집' :
    (DATA.HIP[idx] ? 'HIP '+DATA.HIP[idx] : '');
  const lum = Math.pow(10, (4.83-DATA.M[idx])/2.5);
  const T = starTemp(DATA.CI[idx]);
  const R = starRadiusSol(idx);
  const sys = SYSTEMS[DATA.HIP[idx]];
  const dShip = starPos(idx).distanceTo(ship.pos);
  const rows = idx===0 ? [
    ['분광형','G형 (황색 왜성)'],
    ['여기서 거리', fmtLy(dShip)],
    ['한 마디','우리 집입니다 🌍']
  ] : [
    ['별자리', conName(idx) || '—'],
    ['지구에서 거리', fmtLy(starPos(idx).length())],
    ['여기서 거리', fmtLy(dShip)],
    ['분광형', DATA.SP[idx] + '형 · ' + (SPEC_KR[DATA.SP[idx]]||'')],
    ['표면 온도', Math.round(T/100)*100 + ' K'],
    ['실제 크기', fmtR(R)],
    ['광도', lum >= 1 ? '태양의 ' + (lum>=100?Math.round(lum).toLocaleString():lum.toFixed(1)) + '배'
                      : '태양의 ' + (lum*100).toFixed(1) + '%'],
    ['지구에서 등급', DATA.ME[idx].toFixed(2) + '등급' + (DATA.ME[idx]>6 ? ' (맨눈 불가)' : '')]
  ];
  if (sys) rows.push(['동반성', '있음 (궤도는 연출)']);
  const wrap = document.getElementById('c-rows');
  wrap.innerHTML = '';
  rows.forEach(([k,v]) => {
    const r = document.createElement('div'); r.className='row';
    const ke = document.createElement('span'); ke.className='k'; ke.textContent=k;
    const ve = document.createElement('span'); ve.className='v'; ve.textContent=v;
    r.append(ke,ve); wrap.appendChild(r);
  });

  // 이야기 영역 + 버튼
  const story = document.getElementById('c-story');
  story.style.display = 'none'; story.textContent = '';
  const btns = document.getElementById('c-btns');
  btns.innerHTML = '';
  const curated = idx===0 ? STORY_SUN : STORY[DATA.HIP[idx]];

  if (dShip > 0.12){
    const go = document.createElement('button');
    go.className = 'cbtn'; go.textContent = '🚀 이동';
    go.addEventListener('click', () => setDestination(idx));
    btns.appendChild(go);
  }
  const st = document.createElement('button');
  st.className = 'cbtn';
  st.textContent = curated ? '📖 이야기' : '🤖 AI 해설';
  st.addEventListener('click', () => {
    if (curated){ story.style.display='block'; story.textContent = curated; }
    else aiStory(idx, story);
  });
  btns.appendChild(st);
  if (idx !== 0){
    const ob = document.createElement('button');
    ob.className = 'cbtn'; ob.textContent = '🌙 찾는 법';
    ob.addEventListener('click', () => {
      story.style.display = 'block'; story.textContent = obsGuide(idx);
    });
    btns.appendChild(ob);
  }
  const nm = DATA.NAMES[idx];
  if (nm && !nm.startsWith('Gl ') && idx !== 0){
    const wk = document.createElement('button');
    wk.className = 'cbtn'; wk.textContent = '🌐 위키';
    wk.addEventListener('click', () => {
      window.open('https://en.wikipedia.org/wiki/Special:Search?search=' + encodeURIComponent(nm + ' star'), '_blank');
    });
    btns.appendChild(wk);
  }
  card.classList.add('show');
}
function hideCard(){ card.classList.remove('show'); selectedIdx = null; }
document.getElementById('card-close').addEventListener('click', hideCard);

const toastEl = document.getElementById('toast');
let toastTimer = null;
function toast(msg){
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toastEl.classList.remove('show'), 3400);
}
function fmtLy(d){
  if (d < 0.016) return Math.round(d*63241).toLocaleString() + ' AU';
  if (d < 10) return d.toFixed(2) + ' ly';
  return Math.round(d).toLocaleString() + ' ly';
}

// ============================================================
// 지구(태양) 인디케이터 — 항상 표시
// ============================================================
const homeEl = document.getElementById('home');
const homeArrow = document.getElementById('home-arrow');
const homeMark = document.getElementById('home-mark');
const homeLbl = document.getElementById('home-lbl');
const _camDir = new THREE.Vector3(), _toSun = new THREE.Vector3();

function updateHome(){
  const d = ship.pos.length();
  if (d < 0.12){ homeEl.style.opacity = 0; return; } // 태양계 안에서는 숨김 (지구 라벨과 중복 방지)
  homeEl.style.opacity = 1;
  camera.getWorldDirection(_camDir);
  _toSun.copy(ship.pos).negate().normalize();
  const behind = _camDir.dot(_toSun) < 0;
  _v1.set(0,0,0).project(camera);
  let nx = _v1.x, ny = _v1.y;
  if (behind){ nx = -nx; ny = -ny; }
  const onScreen = !behind && Math.abs(nx) < 0.9 && Math.abs(ny) < 0.82;
  if (onScreen){
    homeArrow.style.display = 'none'; homeMark.style.display = 'inline';
  } else {
    const s = Math.max(Math.abs(nx)/0.9, Math.abs(ny)/0.82, 1e-6);
    nx /= s; ny /= s;
    if (behind && Math.abs(nx) < 0.89 && Math.abs(ny) < 0.81){ ny = ny >= 0 ? -0.82 : -0.82; }
    homeMark.style.display = 'none'; homeArrow.style.display = 'inline-block';
    const ang = Math.atan2(-ny, nx) * 180/Math.PI;
    homeArrow.style.transform = 'rotate(' + ang.toFixed(0) + 'deg)';
  }
  homeEl.style.left = ((nx*0.5+0.5)*innerWidth) + 'px';
  homeEl.style.top  = ((-ny*0.5+0.5)*innerHeight) + 'px';
  homeLbl.textContent = '태양 · ' + fmtLy(d);
}

// ============================================================
// 목적지 레티클
// ============================================================
const reticle = document.getElementById('reticle');
const reticleName = document.getElementById('reticle-name');
function updateReticle(){
  if (ship.target === null){ reticle.style.display='none'; return; }
  _v1.copy(starPos(ship.target)).project(camera);
  camera.getWorldDirection(_camDir);
  _toSun.copy(starPos(ship.target)).sub(ship.pos).normalize();
  if (_camDir.dot(_toSun) < 0){ reticle.style.display='none'; return; }
  reticle.style.display = 'block';
  reticle.style.left = ((_v1.x*0.5+0.5)*innerWidth) + 'px';
  reticle.style.top  = ((-_v1.y*0.5+0.5)*innerHeight) + 'px';
  reticleName.textContent = starName(ship.target) + ' · ' +
    fmtLy(starPos(ship.target).distanceTo(ship.pos));
}

// ============================================================
// 메인 루프
// ============================================================
const clock = new THREE.Clock();
let tick = 0;

function animate(){
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);

  stepTime(dt);

  if (ship.aiming){
    let dy = ship.aimYaw - ship.yaw;
    dy = Math.atan2(Math.sin(dy), Math.cos(dy));
    ship.yaw += dy*0.07;
    ship.pitch += (ship.aimPitch - ship.pitch)*0.07;
    if (Math.abs(dy) < 0.002 && Math.abs(ship.aimPitch-ship.pitch) < 0.002) ship.aiming = false;
  }

  if (ship.target !== null){
    const tp = starPos(ship.target);
    const remain = tp.distanceTo(ship.pos) - ship.stopR;
    if (remain <= 0.0001){
      const idx = ship.target;
      ship.target = null; ship.vel = 0;
      navTarget.textContent = '';
      showCard(idx);
      recordVisit(idx);
      lastArrival = idx;
      const sys = SYSTEMS[DATA.HIP[idx]];
      if (sys) toast('💫 ' + sys.label + ' — 핀치/휠로 물러나 궤도를 감상하세요');
      else if (idx === 0) toast('태양계 도착 — 여덟 행성이 돌고 있습니다 (궤도 간격은 연출, 주기 비율은 실제)');
      else toast(`${starName(idx)} 도착 — 핀치/휠로 거리 조절, ☀ 뒤돌아보기로 태양 찾기`);
    } else {
      const want = Math.min(maxWarp, remain*0.9 + 0.015);
      ship.vel += (want - ship.vel)*Math.min(dt*2.2, 1);
      const step = Math.min(ship.vel*dt, remain);
      ship.pos.addScaledVector(tp.clone().sub(ship.pos).normalize(), step);
      log.total += step; logDirty = true;
      navTarget.textContent = `→ ${starName(ship.target)} · ${fmtLy(remain)} 남음`;
    }
  } else {
    ship.vel = 0;
  }

  stepFollow(dt);

  tick++;
  if (tick % 20 === 0) scanDiscovery();
  if (tick % 12 === 0) refreshNearBodies();
  updateBodies(dt);
  updateSolar(dt);

  // 워프 체감: 속도에 따라 시야각 미세 확장
  const fovT = 60 + Math.min(11, Math.log10(1+ship.vel)*5);
  camera.fov += (fovT - camera.fov)*0.08;
  camera.updateProjectionMatrix();

  camera.position.copy(ship.pos);
  camera.quaternion.setFromEuler(new THREE.Euler(ship.pitch, ship.yaw, 0, 'YXZ'));
  starMat.uniforms.uCam.value.copy(ship.pos);

  navDist.textContent = '태양 거리 ' + fmtLy(ship.pos.length());
  navSpeed.textContent = ship.vel > 0.001
    ? ship.vel.toFixed(2) + ' ly/s · 광속의 ' + (ship.vel*3.156e7).toExponential(1).replace('e+','×10^') + '배'
    : '정지 — 드래그로 둘러보기';

  updateHome();
  updateReticle();
  updateSel();
  renderer.render(scene, camera);
}

const selEl = document.getElementById('sel');
function updateSel(){
  if (selectedIdx === null){ selEl.style.display = 'none'; return; }
  camera.getWorldDirection(_camDir);
  _v2.set(positions[selectedIdx*3], positions[selectedIdx*3+1], positions[selectedIdx*3+2]);
  _toSun.copy(_v2).sub(ship.pos).normalize();
  if (_camDir.dot(_toSun) < 0){ selEl.style.display = 'none'; return; }
  _v1.copy(_v2).project(camera);
  selEl.style.display = 'block';
  selEl.style.left = ((_v1.x*0.5+0.5)*innerWidth) + 'px';
  selEl.style.top  = ((-_v1.y*0.5+0.5)*innerHeight) + 'px';
}
animate();

toast('여름의 대삼각형이 정면에 있습니다 — 별을 탭하면 정체를 알 수 있어요');

addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
